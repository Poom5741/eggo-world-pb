services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: eggo-pb
    restart: unless-stopped
    command: ["serve", "--http=0.0.0.0:8090", "--encryptionEnv=ENCRYPTION", "--hooksDir=/pb/pb_hooks"]
    environment:
      ENCRYPTION: 4nWpfKByg2u3tkbbHAZ34div
      OIDC_CLIENT_ID: "2009441873"
      OIDC_CLIENT_SECRET: "4ede94afa7d59b71ffda15a136ffddea"
      OIDC_ISSUER_URL: "https://access.line.me"
      OIDC_REDIRECT_URI: "http://localhost:3000/frontend/callback.html"
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb/pb_data
      - ./pb_migrations:/pb/pb_migrations
      - ./pb_hooks:/pb/pb_hooks
      - ./pb_public:/pb/pb_public
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
