<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OAuth2 redirect page - eggo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; max-width: 800px; width: 90%; }
        h1 { color: #333; margin-bottom: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00C300; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message { margin: 20px 0; padding: 15px; border-radius: 10px; text-align: left; }
        .message.success { background: #e8f5e9; color: #2e7d32; }
        .message.error { background: #ffebee; color: #c62828; }
        .btn { background: #00C300; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 25px; cursor: pointer; margin-top: 20px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; text-align: left; font-size: 11px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥚 eggo</h1>
        <div id="loader" class="loader"></div>
        <div id="message" class="message"></div>
        <button id="retryBtn" class="btn" style="display: none;" onclick="window.location.href='/line-login.html'">Try Again</button>
    </div>

    <script type="module">
        import PocketBase from "https://cdn.jsdelivr.net/gh/pocketbase/js-sdk@master/dist/pocketbase.es.mjs"

        const pb = new PocketBase(window.location.origin);
        const redirectURL = window.location.origin + "/line-callback.html";
        const LINE_CLIENT_ID = "2009441873";
        const LINE_CLIENT_SECRET = "4ede94afa7d59b71ffda15a136ffddea";

        const loaderEl = document.getElementById("loader");
        const messageEl = document.getElementById("message");
        const retryBtn = document.getElementById("retryBtn");

        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const error = params.get("error");
        const errorDescription = params.get("error_description");
        const state = params.get("state");
        
        let returnUrl = null;
        if (state) {
            try {
                const stateData = JSON.parse(atob(state));
                returnUrl = stateData.returnUrl;
                console.log("Return URL:", returnUrl);
            } catch (e) {}
        }

        console.log("=== OAuth Callback ===");
        console.log("Code:", code ? "yes" : "no");

        function generatePassword() {
            return Array.from(crypto.getRandomValues(new Uint8Array(16)))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        function redirectToLocalhost(lineId, email, name, wallet, userId) {
            if (returnUrl && returnUrl.includes('localhost')) {
                console.log("Redirecting to localhost with user info");
                const url = `${returnUrl}?lineId=${encodeURIComponent(lineId)}&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}&wallet=${encodeURIComponent(wallet || '')}&userId=${encodeURIComponent(userId || '')}`;
                window.location.href = url;
                return true;
            }
            return false;
        }

        async function handleCallback() {
            if (error) {
                showError("LINE Error: " + error);
                return;
            }
            
            if (!code) {
                showError("No authorization code received.");
                return;
            }

            try {
                // Get LINE token
                const tokenResponse = await fetch('https://api.line.me/oauth2/v2.1/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: redirectURL,
                        client_id: LINE_CLIENT_ID,
                        client_secret: LINE_CLIENT_SECRET
                    })
                });

                if (!tokenResponse.ok) {
                    throw new Error("Token exchange failed");
                }

                const tokens = await tokenResponse.json();
                console.log("Got LINE tokens");

                // Get user info from LINE
                const userInfoResponse = await fetch('https://api.line.me/oauth2/v2.1/userinfo', {
                    headers: { 'Authorization': 'Bearer ' + tokens.access_token }
                });
                
                if (!userInfoResponse.ok) {
                    throw new Error("Failed to get user info");
                }
                
                const userInfo = await userInfoResponse.json();
                console.log("LINE User:", userInfo.sub, userInfo.name);

                const lineId = userInfo.sub;
                const name = userInfo.name || 'LINE User';
                const email = userInfo.email || `${lineId.slice(0, 8)}@line.eggo`;

                // Try to find existing user
                let user = null;
                let userId = null;
                let wallet = null;
                
                // Get user info from our API
                try {
                    const userRes = await fetch(window.location.origin + '/api/auth/line-user', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email })
                    });
                    
                    if (userRes.ok) {
                        const userData = await userRes.json();
                        if (userData.success && userData.user) {
                            userId = userData.user.id;
                            wallet = userData.user.wallet_address;
                            console.log("Found existing user:", userId, "wallet:", wallet);
                        }
                    }
                } catch (e) {
                    console.log("User lookup failed:", e);
                }

                // If user doesn't exist, create one
                if (!userId) {
                    console.log("Creating new user...");
                    const password = generatePassword();
                    try {
                        const createRes = await pb.collection('users').create({
                            name: name,
                            email: email,
                            emailVisibility: false,
                            password: password,
                            passwordConfirm: password
                        });
                        userId = createRes.id;
                        console.log("Created user:", userId);
                        
                        // Create wallet
                        try {
                            const walletRes = await fetch(window.location.origin + '/api/wallet/create', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ userId: userId })
                            });
                            if (walletRes.ok) {
                                const walletData = await walletRes.json();
                                wallet = walletData.data?.address;
                                console.log("Created wallet:", wallet);
                            }
                        } catch (e) {
                            console.log("Wallet creation failed:", e);
                        }
                    } catch (createErr) {
                        console.log("Create error:", createErr);
                        // User might already exist, try to get info again
                        if (createErr.data?.data?.email?.code === 'validation_not_unique') {
                            const userRes = await fetch(window.location.origin + '/api/auth/line-user', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email: email })
                            });
                            if (userRes.ok) {
                                const userData = await userRes.json();
                                userId = userData.user?.id;
                                wallet = userData.user?.wallet_address;
                            }
                        }
                    }
                }

                // Redirect to localhost with user info
                if (redirectToLocalhost(lineId, email, name, wallet, userId)) {
                    return;
                }

                // Show success on production
                loaderEl.style.display = "none";
                messageEl.className = "message success";
                messageEl.innerHTML = `
                    <strong>✓ Login Successful!</strong><br><br>
                    <strong>Name:</strong> ${name}<br>
                    <strong>Email:</strong> ${email}<br>
                    <strong>Wallet:</strong> <code>${wallet || 'N/A'}</code>
                `;
                
                setTimeout(() => window.location.href = "/line-login.html", 3000);

            } catch (err) {
                console.error("Error:", err);
                showError(err.message);
            }
        }

        function showError(msg) {
            loaderEl.style.display = "none";
            messageEl.className = "message error";
            messageEl.innerHTML = `<strong>Error:</strong> ${msg}`;
            retryBtn.style.display = "inline-block";
        }

        handleCallback();
    </script>
</body>
</html>
