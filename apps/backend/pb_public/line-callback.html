<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OAuth2 redirect page - eggo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 800px;
            width: 90%;
        }
        h1 { color: #333; margin-bottom: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #00C300; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message { margin: 20px 0; padding: 15px; border-radius: 10px; text-align: left; }
        .message.success { background: #e8f5e9; color: #2e7d32; }
        .message.error { background: #ffebee; color: #c62828; }
        .btn { background: #00C300; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 25px; cursor: pointer; margin-top: 20px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; text-align: left; font-size: 11px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥚 eggo</h1>
        <div id="loader" class="loader"></div>
        <div id="message" class="message"></div>
        <button id="retryBtn" class="btn" style="display: none;" onclick="window.location.href='/line-login.html'">Try Again</button>
    </div>

    <script type="module">
        import PocketBase from "https://cdn.jsdelivr.net/gh/pocketbase/js-sdk@master/dist/pocketbase.es.mjs"

        const pb = new PocketBase(window.location.origin);
        const redirectURL = window.location.origin + "/line-callback.html";
        const LINE_CLIENT_ID = "2009441873";
        const LINE_CLIENT_SECRET = "4ede94afa7d59b71ffda15a136ffddea";

        const loaderEl = document.getElementById("loader");
        const messageEl = document.getElementById("message");
        const retryBtn = document.getElementById("retryBtn");

        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const error = params.get("error");
        const errorDescription = params.get("error_description");
        const state = params.get("state");
        
        // Parse state to get return URL (for local development)
        let returnUrl = null;
        if (state) {
            try {
                const stateData = JSON.parse(atob(state));
                returnUrl = stateData.returnUrl;
                console.log("Found return URL in state:", returnUrl);
            } catch (e) {
                console.log("Could not parse state:", e);
            }
        }

        console.log("=== OAuth Callback ===");
        console.log("Code:", code);
        console.log("Return URL:", returnUrl);

        function generatePassword() {
            return Array.from(crypto.getRandomValues(new Uint8Array(16)))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        async function handleCallback() {
            if (error) {
                showError("LINE Error: " + error + (errorDescription ? " - " + errorDescription : ""));
                return;
            }
            
            if (!code) {
                showError("No authorization code received.");
                return;
            }

            try {
                const tokenResponse = await fetch('https://api.line.me/oauth2/v2.1/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: redirectURL,
                        client_id: LINE_CLIENT_ID,
                        client_secret: LINE_CLIENT_SECRET
                    })
                });

                if (!tokenResponse.ok) {
                    const errText = await tokenResponse.text();
                    throw new Error("Token exchange failed: " + errText);
                }

                const tokens = await tokenResponse.json();
                console.log("Got tokens:", tokens.access_token ? "yes" : "no");

                const userInfoResponse = await fetch('https://api.line.me/oauth2/v2.1/userinfo', {
                    headers: { 'Authorization': 'Bearer ' + tokens.access_token }
                });
                
                if (!userInfoResponse.ok) {
                    throw new Error("Failed to get user info");
                }
                
                const userInfo = await userInfoResponse.json();
                console.log("User info:", userInfo);

                const sub = userInfo.sub;
                const name = userInfo.name || 'LINE User';
                const email = userInfo.email || `${sub.slice(0, 8)}@line.eggo`;

                console.log("Looking for user:", { sub, name, email });

                let user;
                let isNewUser = false;
                
                try {
                    user = await pb.collection('users').getFirstListItem(`email='${email}'`);
                    console.log("Found existing user:", user.id, "wallet:", user.wallet_address);
                } catch (e) {
                    console.log("User not found, creating new...");
                    isNewUser = true;
                    const password = generatePassword();
                    try {
                        user = await pb.collection('users').create({
                            name: name,
                            email: email,
                            emailVisibility: false,
                            password: password,
                            passwordConfirm: password
                        });
                        console.log("Created user:", user.id);
                    } catch (createErr) {
                        const errData = createErr.data?.data || {};
                        console.log("Create error details:", JSON.stringify(errData, null, 2));
                        
                        if (errData.email?.code === 'validation_not_unique') {
                            console.log("User already exists, proceeding with existing user");
                            isNewUser = false;
                            
                            loaderEl.style.display = "none";
                            messageEl.className = "message success";
                            messageEl.innerHTML = `
                                <strong>✓ Already Registered!</strong><br><br>
                                <strong>Name:</strong> ${name}<br>
                                <strong>Email:</strong> ${email}<br>
                                <strong>LINE ID:</strong> ${sub}<br>
                                <br><p>Your account already exists. Wallet was created on first login.</p>
                            `;
                            
                            setTimeout(() => window.location.href = "/line-login.html", 3000);
                            return;
                        } else {
                            showError("Create failed: " + JSON.stringify(errData));
                            return;
                        }
                    }
                }

                if (!user.wallet_address) {
                    console.log("Creating wallet via API...");
                    try {
                        const walletRes = await fetch(window.location.origin + '/api/wallet/create', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId: user.id })
                        });
                        
                        if (walletRes.ok) {
                            const walletData = await walletRes.json();
                            console.log("Wallet created:", walletData);
                            user = await pb.collection('users').getOne(user.id);
                            console.log("Refreshed user with wallet:", user.wallet_address);
                        } else {
                            console.log("Wallet API response:", walletRes.status, await walletRes.text());
                        }
                    } catch (walletErr) {
                        console.log("Wallet creation error:", walletErr.message);
                    }
                }

                localStorage.setItem('pb_auth', JSON.stringify({ token: pb.authStore.token, model: user }));

                // If we have a return URL (from local development), redirect back with auth data
                if (returnUrl && returnUrl.includes('localhost')) {
                    console.log("Redirecting back to local development:", returnUrl);
                    const redirectWithAuth = `${returnUrl}?token=${encodeURIComponent(pb.authStore.token)}&user=${encodeURIComponent(JSON.stringify(user))}`;
                    window.location.href = redirectWithAuth;
                    return;
                }

                loaderEl.style.display = "none";
                messageEl.className = "message success";
                messageEl.innerHTML = `
                    <strong>✓ Login Successful!</strong><br><br>
                    <strong>Name:</strong> ${user.name || 'N/A'}<br>
                    <strong>Email:</strong> ${user.email || 'N/A'}<br>
                    <strong>Wallet:</strong> <code>${user.wallet_address || 'N/A'}</code><br>
                    <br><details><summary>Details</summary><pre>${JSON.stringify(user, null, 2)}</pre></details>
                `;
                
                setTimeout(() => window.location.href = "/line-login.html", 3000);

            } catch (err) {
                console.error("Error:", err);
                showError(err.message + (err.data?.data ? " - " + JSON.stringify(err.data.data) : ""));
            }
        }

        function showError(msg) {
            loaderEl.style.display = "none";
            messageEl.className = "message error";
            messageEl.innerHTML = `<strong>Error:</strong> ${msg}`;
            retryBtn.style.display = "inline-block";
        }

        handleCallback();
    </script>
</body>
</html>
