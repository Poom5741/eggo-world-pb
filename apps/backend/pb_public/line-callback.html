<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>OAuth2 redirect page - eggo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 800px;
            width: 90%;
        }
        h1 { color: #333; margin-bottom: 20px; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #00C300;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message { margin: 20px 0; padding: 15px; border-radius: 10px; text-align: left; }
        .message.success { background: #e8f5e9; color: #2e7d32; }
        .message.error { background: #ffebee; color: #c62828; }
        .btn { background: #00C300; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 25px; cursor: pointer; margin-top: 20px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; text-align: left; font-size: 11px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🥚 eggo</h1>
        <div id="loader" class="loader"></div>
        <div id="message" class="message"></div>
        <button id="retryBtn" class="btn" style="display: none;" onclick="window.location.href='/line-login.html'">Try Again</button>
    </div>

    <script type="module">
        const BASE_URL = window.location.origin;
        const redirectURL = BASE_URL + "/line-callback.html";

        const loaderEl = document.getElementById("loader");
        const messageEl = document.getElementById("message");
        const retryBtn = document.getElementById("retryBtn");

        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const error = params.get("error");

        console.log("=== OAuth Callback ===");

        async function handleCallback() {
            if (error) { showError("LINE Error: " + error); return; }
            if (!code) { showError("No authorization code received."); return; }

            try {
                // Step 1: OAuth login
                const authResponse = await fetch(BASE_URL + '/api/collections/users/auth-with-oauth2', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        provider: 'oidc',
                        code: code,
                        codeVerifier: '',
                        redirectURL: redirectURL,
                        createData: { emailVisibility: false }
                    })
                });

                const authData = await authResponse.json();
                console.log("Auth response:", authData);

                if (!authResponse.ok) {
                    showError(`Auth Error: ${authData.message}`);
                    return;
                }

                // Store auth
                localStorage.setItem('pb_auth', JSON.stringify({ token: authData.token, user: authData.record }));

                // Wallet should be created by hook
                let walletAddress = authData.record?.wallet_address;
                
                console.log("User created with wallet:", walletAddress || "will be created by hook");

                // Show success
                loaderEl.style.display = "none";
                messageEl.className = "message success";
                messageEl.innerHTML = `
                    <strong>✓ Login Successful!</strong><br><br>
                    <strong>Name:</strong> ${authData.record?.name || 'N/A'}<br>
                    <strong>Email:</strong> ${authData.record?.email || 'N/A'}<br>
                    <strong>Wallet:</strong> <code>${walletAddress || 'N/A'}</code><br>
                    <br><details><summary>Details</summary><pre>${JSON.stringify(authData, null, 2)}</pre></details>
                `;
                
                setTimeout(() => window.location.href = "/line-login.html", 3000);

            } catch (err) {
                console.error("Error:", err);
                showError(err.message);
            }
        }

        function showError(msg) {
            loaderEl.style.display = "none";
            messageEl.className = "message error";
            messageEl.innerHTML = msg;
            retryBtn.style.display = "inline-block";
        }

        handleCallback();
    </script>
</body>
</html>
